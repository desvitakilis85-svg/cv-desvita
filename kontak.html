<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Form Kontak</title>

<style>

body{
font-family: Arial, sans-serif;
background:#4b5320;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:500px;
margin:auto;
}

a{
color:white;
}

form{
text-align:left;
margin-top:20px;
}

input, select, textarea{

padding:8px;

margin-bottom:15px;

}

color:#4b5320;

}

button:hover{

}

footer{
margin-top:30px;
}

<div class="container">

<input type="text" placeholder="Masukkan nomor HP">

<label>Subjek</label>
<select>
<option>Pertanyaan</option>
<option>Kerjasama</option>

</label>

<footer>
